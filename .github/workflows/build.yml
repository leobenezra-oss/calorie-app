name: Build and Test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Check app starts
        run: |
          timeout 10 node index.js &
          sleep 5
          curl -f http://localhost:3000 || exit 1
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PORT: 3000